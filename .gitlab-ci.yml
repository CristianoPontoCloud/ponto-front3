# CI/CD para pontocloud-client-side (Vercel)

stages:
  - lint
  - test
  - deploy:preview
  - deploy:production

variables:
  NODE_VERSION: "22.14.0"

# Lint stage
lint:
  image: node:${NODE_VERSION}-alpine
  stage: lint
  before_script:
    - yarn install --frozen-lockfile
  script:
    - yarn lint
  only:
    - merge_requests
    - main
    - develop
  cache:
    key: ${CI_COMMIT_REF_SLUG}-yarn
    paths:
      - node_modules/
      - .yarn/cache/

# Test stage
test:
  image: node:${NODE_VERSION}-alpine
  stage: test
  before_script:
    - yarn install --frozen-lockfile
  script:
    - yarn test || echo "No test script, skipping"
  only:
    - merge_requests
    - main
    - develop
  cache:
    key: ${CI_COMMIT_REF_SLUG}-yarn
    paths:
      - node_modules/
      - .yarn/cache/

# Deploy Preview (MR)
# Requer: VERCEL_TOKEN, VERCEL_ORG_ID (team slug), VERCEL_PROJECT_ID em GitLab CI/CD Variables
deploy:preview:
  image: node:${NODE_VERSION}-alpine
  stage: deploy:preview
  before_script:
    - apk add --no-cache curl
    - npm install -g vercel@latest
    - yarn install --frozen-lockfile
  script:
    - vercel deploy --token $VERCEL_TOKEN --scope $VERCEL_ORG_ID --yes
  environment:
    name: preview/$CI_MERGE_REQUEST_IID
    url: https://$CI_MERGE_REQUEST_IID-$(echo $CI_PROJECT_NAME | tr '[:upper:]' '[:lower:]').vercel.app
    on_stop: stop_preview
  only:
    - merge_requests
  when: manual

stop_preview:
  image: node:${NODE_VERSION}-alpine
  stage: deploy:preview
  before_script:
    - apk add --no-cache curl
    - npm install -g vercel@latest
  script:
    - vercel remove --token $VERCEL_TOKEN --scope $VERCEL_ORG_ID --yes
  environment:
    name: preview/$CI_MERGE_REQUEST_IID
    action: stop
  only:
    - merge_requests
  when: manual

# Deploy Production (main branch)
# Requer: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID em GitLab CI/CD Variables
deploy:production:
  image: node:${NODE_VERSION}-alpine
  stage: deploy:production
  before_script:
    - apk add --no-cache curl
    - npm install -g vercel@latest
    - yarn install --frozen-lockfile
  script:
    - vercel deploy --prod --token $VERCEL_TOKEN --scope $VERCEL_ORG_ID --yes
  environment:
    name: production
    url: https://app.dev.ponto.cloud
  only:
    - main
  when: manual
