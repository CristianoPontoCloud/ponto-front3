# ============================================================
#  GitHub Actions — Ponto Front (ponto.gestorkpi.com.br)
#  Deploy via Tailscale
# ============================================================
#
#  SECRETS:
#    ENV_PRODUCTION             → Conteúdo completo do .env de produção
#                                 (cole o .env inteiro como valor do secret)
#    TS_OAUTH_CLIENT_ID         → OAuth client ID do Tailscale
#    TS_OAUTH_SECRET            → OAuth client secret do Tailscale
#    VPS_TAILSCALE_IP           → IP Tailscale da VPS
#    VPS_USER                   → deploy
#    VPS_SSH_KEY                → Chave privada SSH
#    SSH_PASSPHRASE             → Passphrase da chave SSH (se tiver)
#    DEPLOY_PATH                → /opt/app
#    GHCR_TOKEN                 → Personal Access Token (read:packages)
#
#  COMO CONFIGURAR O ENV_PRODUCTION:
#    1. Vá no repo > Settings > Secrets > Actions > New repository secret
#    2. Nome: ENV_PRODUCTION
#    3. Valor: cole o conteúdo INTEIRO do seu .env de produção
#       (todas as linhas, como se fosse o arquivo completo)
#    4. Salve
#
# ============================================================

name: Deploy Ponto Front

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_LC: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn lint || true

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Convert image name to lowercase
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME_LC,,}" >> $GITHUB_ENV

      - name: Criar .env.production a partir do secret
        run: |
                cat << 'ENDOFENV' > .env.production
                ${{ secrets.ENV_PRODUCTION }}
                ENDOFENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Conectar no Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy na VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_TAILSCALE_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull ponto
            docker compose up -d --no-deps --force-recreate ponto
            docker image prune -f
            echo "✅ Ponto Front atualizado!"
